<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Fire Gradients -->
    <linearGradient id="fireColours" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#FF4500"/>
    </linearGradient>
  </defs>

  <!-- Big Flame Base -->
  <path d="M50,5 C40,25 20,40 20,60 C20,80 35,95 50,95 C65,95 80,80 80,60 C80,40 60,25 50,5 Z" 
        fill="url(#fireColours)" opacity="0.9"/>
  
  <!-- Inner Flame -->
  <path d="M50,20 C45,35 30,50 30,65 C30,78 40,85 50,85 C60,85 70,78 70,65 C70,50 55,35 50,20 Z" 
        fill="#FFD700" opacity="0.8"/>

  <!-- Core Flame -->
  <path d="M50,40 C48,50 40,60 40,70 C40,78 45,80 50,80 C55,80 60,78 60,70 C60,60 52,50 50,40 Z" 
        fill="#FFFFFF" opacity="0.9"/>

  <!-- Soccer Ball -->
  <g transform="translate(50, 65) scale(0.35)">
    <!-- Ball shape -->
    <circle cx="0" cy="0" r="50" fill="#f8f9fa" stroke="#343a40" stroke-width="4"/>
    
    <!-- Center pentagon -->
    <path d="M 0,-20 L 19,-6 L 12,16 L -12,16 L -19,-6 Z" fill="#212529"/>
    
    <!-- Lines connecting pentagons -->
    <line x1="0" y1="-20" x2="0" y2="-50" stroke="#343a40" stroke-width="3"/>
    <line x1="19" y1="-6" x2="47" y2="-15" stroke="#343a40" stroke-width="3"/>
    <line x1="12" y1="16" x2="29" y2="40" stroke="#343a40" stroke-width="3"/>
    <line x1="-12" y1="16" x2="-29" y2="40" stroke="#343a40" stroke-width="3"/>
    <line x1="-19" y1="-6" x2="-47" y2="-15" stroke="#343a40" stroke-width="3"/>

    <!-- Edge pentagons (partially visible) -->
    <path d="M -29,40 L -12,50 L -45,50 Z" fill="#212529" clip-path="url(#circle-cut)"/>
    <path d="M 29,40 L 12,50 L 45,50 Z" fill="#212529" clip-path="url(#circle-cut)"/>
    <path d="M -47,-15 L -50,15 L -50,-40 Z" fill="#212529" clip-path="url(#circle-cut)"/>
    <path d="M 47,-15 L 50,15 L 50,-40 Z" fill="#212529" clip-path="url(#circle-cut)"/>
    <path d="M -20,-50 L 20,-50 L 0,-60 Z" fill="#212529" clip-path="url(#circle-cut)"/>
    
    <!-- Clip path to keep ball markings inside the circle -->
    <clipPath id="circle-cut">
      <circle cx="0" cy="0" r="49"/>
    </clipPath>
  </g>
</svg>
